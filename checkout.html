<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zamówienie — TinyHugs</title>
  <link rel="stylesheet" href="style.css"/>
  
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }
    @keyframes slideRight {
      from { width: 0; }
    }

    body { background: linear-gradient(135deg, #FDF6F0 0%, #FAF0F5 100%); min-height: 100vh; }

    .co-page {
      max-width: 1040px;
      margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
      animation: fadeIn 0.4s ease;
    }

    .co-page h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    /* KROKI */
    .steps {
      display: flex;
      align-items: center;
      margin-bottom: 2.5rem;
      gap: 0;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      transition: color 0.3s;
      cursor: default;
    }
    .step-num {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700;
      transition: all 0.35s cubic-bezier(.4,0,.2,1);
      background: var(--warm-white);
    }
    .step.active .step-num  { background: var(--brown); border-color: var(--brown); color: #fff; transform: scale(1.1); box-shadow: 0 0 0 4px rgba(139,94,60,0.15); }
    .step.active            { color: var(--text); font-weight: 600; }
    .step.done  .step-num   { background: #5aaa6a; border-color: #5aaa6a; color: #fff; }
    .step.done              { color: #5aaa6a; }
    .step-line {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 0.6rem;
      overflow: hidden;
      position: relative;
    }
    .step-line-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brown), var(--blush-dark));
      border-radius: 2px;
      width: 0;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }

    /* LAYOUT */
    .co-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1.5rem;
      align-items: start;
    }

    /* PANEL */
    .co-panel {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(237,229,218,0.8);
      border-radius: 20px;
      padding: 1.6rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 24px rgba(139,94,60,0.07);
      animation: fadeUp 0.4s ease both;
    }
    .co-panel:nth-child(2) { animation-delay: 0.08s; }
    .co-panel:nth-child(3) { animation-delay: 0.16s; }
    .co-panel:nth-child(4) { animation-delay: 0.24s; }

    .co-panel h2 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      margin-bottom: 1.3rem;
      display: flex; align-items: center; gap: 0.5rem;
      color: var(--text);
    }

    /* FORMULARZ */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-row.full { grid-template-columns: 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-group label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }

    .form-group input,
    .form-group select {
      padding: 0.7rem 1rem;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 0.9rem;
      font-family: var(--font-body);
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--brown);
      box-shadow: 0 0 0 3px rgba(139,94,60,0.1);
      transform: translateY(-1px);
    }

    /* KRAJ */
    .free-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: #edfaee; color: #3a8a4a;
      border: 1px solid #b8e8bc;
      border-radius: 50px;
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem; font-weight: 600;
      margin-top: 0.5rem;
      animation: pulse 2s infinite;
    }
    .intl-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: #fff8ee; color: #8B6020;
      border: 1px solid #f0d8a0;
      border-radius: 50px;
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem; font-weight: 600;
      margin-top: 0.5rem;
    }

    /* METODY DOSTAWY */
    .shipping-methods { display: flex; flex-direction: column; gap: 0.7rem; }
    .shipping-method {
      display: flex; align-items: center; gap: 1rem;
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.1rem;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(.4,0,.2,1);
      background: #fff;
      position: relative;
      overflow: hidden;
    }
    .shipping-method::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(139,94,60,0.04), rgba(242,184,198,0.06));
      opacity: 0;
      transition: opacity 0.25s;
    }
    .shipping-method:hover { border-color: var(--brown-light); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(139,94,60,0.1); }
    .shipping-method:hover::before { opacity: 1; }
    .shipping-method.selected { border-color: var(--brown); background: #FDF5EE; box-shadow: 0 4px 20px rgba(139,94,60,0.15); }
    .shipping-method.selected::before { opacity: 1; }

    .shipping-method input[type=radio] { display: none; }
    .radio-circle {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .shipping-method.selected .radio-circle {
      border-color: var(--brown);
      background: var(--brown);
    }
    .radio-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #fff;
      opacity: 0; transform: scale(0);
      transition: all 0.2s;
    }
    .shipping-method.selected .radio-dot { opacity: 1; transform: scale(1); }

    .shipping-logo { font-size: 1.6rem; flex-shrink: 0; }
    .shipping-info { flex: 1; }
    .shipping-name { font-weight: 700; font-size: 0.92rem; color: var(--text); }
    .shipping-desc { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.15rem; }
    .shipping-price { font-weight: 700; font-size: 1rem; color: var(--brown); white-space: nowrap; }
    .shipping-free  { font-weight: 700; font-size: 0.9rem; color: #3a8a4a; white-space: nowrap; }

    /* MAPA */
    .paczkomat-section { margin-top: 1rem; overflow: hidden; }
    .paczkomat-search {
      display: flex; gap: 0.5rem; margin-bottom: 0.8rem;
    }
    .paczkomat-search input {
      flex: 1; padding: 0.6rem 1rem;
      border: 2px solid var(--border); border-radius: 12px;
      font-size: 0.88rem; font-family: var(--font-body);
      outline: none; transition: border-color 0.2s;
    }
    .paczkomat-search input:focus { border-color: var(--brown); }
    .paczkomat-search button {
      background: var(--brown); color: #fff;
      padding: 0.6rem 1.1rem; border-radius: 12px;
      font-size: 0.85rem; font-weight: 700;
      transition: all 0.2s;
    }
    .paczkomat-search button:hover { background: var(--blush-dark); transform: scale(1.02); }

    #paczkomat-map {
      width: 100%; height: 360px;
      border-radius: 14px;
      border: 2px solid var(--border);
      overflow: hidden;
    }
    .map-wrap { position: relative; }
    #map-loading {
      display: none;
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(4px);
      z-index: 999;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 0.6rem;
      border-radius: 14px;
    }
    .spin-ring {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--brown);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .selected-paczkomat-box {
      display: flex; align-items: center; gap: 0.8rem;
      background: #edfaee;
      border: 2px solid #b8e8bc;
      border-radius: 14px;
      padding: 0.9rem 1.1rem;
      margin-top: 0.7rem;
      animation: fadeUp 0.3s ease;
    }
    .selected-paczkomat-box strong { color: #2e6b30; }
    .selected-paczkomat-box .change-btn {
      margin-left: auto; font-size: 0.8rem;
      color: var(--text-muted); text-decoration: underline;
      background: none; border: none; cursor: pointer;
    }

    /* PRZYCISK DALEJ */
    .next-btn {
      width: 100%; padding: 1rem;
      background: linear-gradient(135deg, var(--brown) 0%, #a0724a 100%);
      color: #fff;
      border: none; border-radius: 14px;
      font-size: 1.05rem; font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(139,94,60,0.3);
      letter-spacing: 0.3px;
    }
    .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(139,94,60,0.4); }
    .next-btn:active { transform: translateY(0); }

    /* PODSUMOWANIE */
    .co-summary {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(237,229,218,0.8);
      border-radius: 20px;
      padding: 1.6rem;
      box-shadow: 0 4px 24px rgba(139,94,60,0.07);
      position: sticky;
      top: 90px;
      animation: fadeUp 0.4s ease 0.1s both;
    }
    .co-summary h2 { font-family: var(--font-display); font-size: 1.2rem; margin-bottom: 1.2rem; }

    .order-item {
      display: flex; gap: 0.8rem; align-items: center;
      margin-bottom: 0.8rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--border);
    }
    .order-item:last-of-type { border-bottom: none; }
    .order-item-img {
      width: 52px; height: 52px;
      border-radius: 10px; overflow: hidden;
      background: var(--cream); flex-shrink: 0;
    }
    .order-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .order-item-name  { font-size: 0.85rem; font-weight: 600; }
    .order-item-var   { font-size: 0.75rem; color: var(--text-muted); }
    .order-item-price { margin-left: auto; font-weight: 700; color: var(--brown); white-space: nowrap; }

    .summary-row {
      display: flex; justify-content: space-between;
      font-size: 0.88rem; color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .summary-row.total {
      font-size: 1.1rem; font-weight: 700;
      color: var(--text);
      border-top: 2px solid var(--border);
      padding-top: 0.8rem; margin-top: 0.5rem;
    }
    .summary-row.total span:last-child { color: var(--brown); }
    .secure-note { text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 0.8rem; }

    /* UKRYTE */
    .hidden { display: none !important; }

    /* POPUP LEAFLET */
    .leaflet-popup-content-wrapper { border-radius: 14px !important; font-family: var(--font-body) !important; box-shadow: 0 8px 32px rgba(0,0,0,0.15) !important; }
    .leaflet-popup-content { margin: 14px 16px !important; }
    .popup-id   { font-weight: 800; font-size: 0.88rem; color: var(--text); margin-bottom: 3px; }
    .popup-addr { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 6px; line-height: 1.5; }
    .popup-hrs  { font-size: 0.72rem; color: #3a8a4a; font-weight: 700; margin-bottom: 8px; }
    .popup-btn  {
      width: 100%; padding: 7px 0;
      background: var(--brown); color: #fff;
      border: none; border-radius: 8px;
      font-size: 0.82rem; font-weight: 700; cursor: pointer;
      transition: background 0.2s;
    }
    .popup-btn:hover { background: var(--blush-dark); }

    @media (max-width: 768px) {
      .co-layout { grid-template-columns: 1fr; }
      .co-summary { position: static; }
      .form-row   { grid-template-columns: 1fr; }
      .co-page    { padding: 1rem 1rem 4rem; }
    }
  </style>
</head>
<body data-page="checkout">
<div id="nav-placeholder"></div>

<main class="co-page">
  <h1>📦 Zamówienie</h1>

  <!-- KROKI -->
  <div class="steps">
    <div class="step active" id="step-1"><span class="step-num">1</span> Dane</div>
    <div class="step-line"><div class="step-line-fill" id="line-1"></div></div>
    <div class="step" id="step-2"><span class="step-num">2</span> Dostawa</div>
    <div class="step-line"><div class="step-line-fill" id="line-2"></div></div>
    <div class="step" id="step-3"><span class="step-num">3</span> Płatność</div>
  </div>

  <div class="co-layout">
    <!-- LEWA KOLUMNA -->
    <div id="co-left">

      <!-- KROK 1: DANE -->
      <div id="section-data">
        <div class="co-panel">
          <h2>👤 Dane osobowe</h2>
          <div class="form-row">
            <div class="form-group"><label>Imię *</label><input type="text" id="fname" placeholder="Jan" autocomplete="given-name"/></div>
            <div class="form-group"><label>Nazwisko *</label><input type="text" id="lname" placeholder="Kowalski" autocomplete="family-name"/></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>E-mail *</label><input type="email" id="email" placeholder="jan@email.com" autocomplete="email"/></div>
            <div class="form-group"><label>Telefon</label><input type="tel" id="phone" placeholder="+48 600 000 000" autocomplete="tel"/></div>
          </div>
        </div>

        <div class="co-panel">
          <h2>🌍 Kraj wysyłki</h2>
          <div class="form-row full">
            <div class="form-group">
              <label>Wybierz kraj *</label>
              <select id="country" onchange="onCountryChange()">
                <option value="">— Wybierz kraj —</option>
                <option value="PL">🇵🇱 Polska</option>
                <option value="DE">🇩🇪 Niemcy</option>
                <option value="FR">🇫🇷 Francja</option>
                <option value="GB">🇬🇧 Wielka Brytania</option>
                <option value="CZ">🇨🇿 Czechy</option>
                <option value="SK">🇸🇰 Słowacja</option>
                <option value="AT">🇦🇹 Austria</option>
                <option value="NL">🇳🇱 Holandia</option>
                <option value="BE">🇧🇪 Belgia</option>
                <option value="IT">🇮🇹 Włochy</option>
                <option value="ES">🇪🇸 Hiszpania</option>
                <option value="SE">🇸🇪 Szwecja</option>
                <option value="NO">🇳🇴 Norwegia</option>
                <option value="DK">🇩🇰 Dania</option>
                <option value="FI">🇫🇮 Finlandia</option>
                <option value="HU">🇭🇺 Węgry</option>
                <option value="RO">🇷🇴 Rumunia</option>
                <option value="UA">🇺🇦 Ukraina</option>
                <option value="OTHER">🌍 Inne</option>
              </select>
              <div id="country-badge"></div>
            </div>
          </div>

          <!-- Adres PL -->
          <div id="addr-pl" class="hidden" style="margin-top:1rem;">
            <div class="form-row full">
              <div class="form-group"><label>Ulica i numer *</label><input type="text" id="street" placeholder="ul. Kwiatowa 5/3" autocomplete="street-address"/></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Kod pocztowy *</label><input type="text" id="zip" placeholder="00-000" maxlength="6"/></div>
              <div class="form-group"><label>Miasto *</label><input type="text" id="city" placeholder="Warszawa" autocomplete="address-level2"/></div>
            </div>
          </div>

          <!-- Adres zagranica -->
          <div id="addr-intl" class="hidden" style="margin-top:1rem;">
            <div class="form-row full">
              <div class="form-group"><label>Pełny adres *</label><input type="text" id="addr-full" placeholder="Street, City, ZIP, Country" autocomplete="street-address"/></div>
            </div>
          </div>
        </div>

        <button class="next-btn" onclick="goToShipping()">Dalej — Wybierz dostawę →</button>
      </div>

      <!-- KROK 2: DOSTAWA (ukryty na start) -->
      <div id="section-shipping" class="hidden">
        <div class="co-panel">
          <h2>🚚 Metoda dostawy</h2>
          <div class="shipping-methods" id="shipping-methods-list"></div>

          <!-- MAPA PACZKOMATÓW -->
          <div id="paczkomat-section" class="paczkomat-section hidden">
            <div id="selected-paczkomat-display"></div>
            <div id="paczkomat-map-wrapper">
            </div>
          </div>
        </div>

        <button class="next-btn" onclick="goToPayment()">Dalej — Przejdź do płatności →</button>
      </div>

      <!-- KROK 3: PŁATNOŚĆ (ukryty na start) -->
      <div id="section-payment" class="hidden">
        <div class="co-panel">
          <h2>💳 Metoda płatności</h2>
          <div class="shipping-methods">
            <label class="shipping-method selected" onclick="selectPayment(this)">
              <input type="radio" name="payment" value="blik" checked/>
              <div class="radio-circle"><div class="radio-dot"></div></div>
              <span class="shipping-logo">📱</span>
              <div class="shipping-info">
                <div class="shipping-name">BLIK</div>
                <div class="shipping-desc">Płatność jednorazowym kodem BLIK</div>
              </div>
            </label>
            <label class="shipping-method" onclick="selectPayment(this)">
              <input type="radio" name="payment" value="card"/>
              <div class="radio-circle"><div class="radio-dot"></div></div>
              <span class="shipping-logo">💳</span>
              <div class="shipping-info">
                <div class="shipping-name">Karta płatnicza</div>
                <div class="shipping-desc">Visa, Mastercard — obsługa przez Stripe</div>
              </div>
            </label>
            <label class="shipping-method" onclick="selectPayment(this)">
              <input type="radio" name="payment" value="transfer"/>
              <div class="radio-circle"><div class="radio-dot"></div></div>
              <span class="shipping-logo">🏦</span>
              <div class="shipping-info">
                <div class="shipping-name">Przelew bankowy</div>
                <div class="shipping-desc">Dane do przelewu otrzymasz w e-mailu</div>
              </div>
            </label>
          </div>
        </div>
        <button class="next-btn" onclick="placeOrder()" style="background:linear-gradient(135deg,#3a8a4a,#5aaa6a);box-shadow:0 4px 20px rgba(58,138,74,0.35);">
          ✅ Złóż zamówienie
        </button>
      </div>

    </div>

    <!-- PODSUMOWANIE -->
    <div class="co-summary">
      <h2>Twoje zamówienie</h2>
      <div id="order-items-list"></div>
      <div class="summary-row"><span>Produkty</span><span id="sum-products">—</span></div>
      <div class="summary-row"><span>Dostawa</span><span id="sum-shipping">—</span></div>
      <div class="summary-row total"><span>Razem</span><span id="sum-total">—</span></div>
      <div class="secure-note">🔒 Bezpieczna płatność · Szyfrowanie SSL</div>
    </div>
  </div>
</main>


<script src="i18n.js"></script>
<script src="nav.js"></script>
<script src="products.js"></script>
<script src="cart.js"></script>
<script>
renderNav("");

// ===== STAN =====
let currentStep = 1;
let selectedShippingId = null;
let selectedShippingCost = 0;
let selectedPaczkomat = null;

// ===== KROKI =====
function setStep(n) {
  currentStep = n;
  [1,2,3].forEach(i => {
    const s = document.getElementById("step-" + i);
    s.classList.remove("active","done");
    if (i < n)  s.classList.add("done");
    if (i === n) s.classList.add("active");
    // Wypełnij linie
    const line = document.getElementById("line-" + i);
    if (line) line.style.width = i < n ? "100%" : "0";
  });
}

// ===== ZMIANA KRAJU =====
function onCountryChange() {
  const country = document.getElementById("country").value;
  const badge   = document.getElementById("country-badge");
  const addrPl  = document.getElementById("addr-pl");
  const addrIn  = document.getElementById("addr-intl");

  addrPl.classList.add("hidden");
  addrIn.classList.add("hidden");
  badge.innerHTML = "";

  if (!country) return;

  if (country === "PL") {
    addrPl.classList.remove("hidden");
    badge.innerHTML = `<span class="free-badge">✅ Darmowa dostawa od 119 zł!</span>`;
  } else {
    addrIn.classList.remove("hidden");
    const cost = getIntlCost(country);
    badge.innerHTML = `<span class="intl-badge">🌍 Dostawa zagraniczna: ${formatPrice(cost)}</span>`;
  }
  renderSummary();
}

function getIntlCost(c) {
  const eu = ["DE","FR","GB","CZ","SK","AT","NL","BE","IT","ES","SE","NO","DK","FI","HU","RO"];
  return eu.includes(c) ? 35 : 55;
}

// ===== PRZEJŚCIE DO DOSTAWY =====
function goToShipping() {
  const fname   = document.getElementById("fname").value.trim();
  const email   = document.getElementById("email").value.trim();
  const country = document.getElementById("country").value;

  if (!fname)   { shake("fname");  return; }
  if (!email)   { shake("email");  return; }
  if (!country) { shake("country"); return; }

  document.getElementById("section-data").classList.add("hidden");

  if (country === "PL") {
    document.getElementById("section-shipping").classList.remove("hidden");
    renderShippingPL();
  } else {
    // Zagranica - od razu do płatności
    selectedShippingCost = getIntlCost(country);
    document.getElementById("section-payment").classList.remove("hidden");
    setStep(3);
  }

  setStep(country === "PL" ? 2 : 3);
  renderSummary();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function shake(id) {
  const el = document.getElementById(id);
  el.style.animation = "none";
  el.offsetHeight;
  el.style.animation = "shake 0.4s ease";
  el.style.borderColor = "#e05555";
  setTimeout(() => { el.style.borderColor = ""; el.style.animation = ""; }, 1500);
}

// ===== DOSTAWA PL =====
const SHIPPING_OPTIONS = [
  { id: "inpost-paczkomat", logo: "📦", name: "InPost Paczkomat", desc: "Odbiór 24/7 · 1-2 dni robocze", cost: 12.99, paczkomat: true },
  { id: "inpost-kurier",    logo: "🟡", name: "InPost Kurier",    desc: "Pod drzwi · 1-2 dni robocze",  cost: 14.99 },
  { id: "dpd",              logo: "🔴", name: "DPD Kurier",       desc: "Pod drzwi · 1-3 dni robocze",  cost: 15.99 },
  { id: "dhl",              logo: "🟠", name: "DHL Kurier",       desc: "Pod drzwi · 1-2 dni robocze",  cost: 16.99 },
];

function renderShippingPL() {
  const total = getCartTotal();
  const free  = total >= 119;
  const list  = document.getElementById("shipping-methods-list");

  list.innerHTML = SHIPPING_OPTIONS.map((o,i) => `
    <label class="shipping-method" data-id="${o.id}" data-cost="${o.cost}"
           style="animation:fadeUp 0.3s ease ${i*0.07}s both"
           onclick="selectShipping(this, ${!!o.paczkomat})">
      <input type="radio" name="shipping" value="${o.id}"/>
      <div class="radio-circle"><div class="radio-dot"></div></div>
      <span class="shipping-logo">${o.logo}</span>
      <div class="shipping-info">
        <div class="shipping-name">${o.name}</div>
        <div class="shipping-desc">${o.desc}</div>
      </div>
      <span class="${free ? 'shipping-free' : 'shipping-price'}">${free ? 'Darmowa 🎉' : o.cost.toFixed(2) + ' zł'}</span>
    </label>`).join("");
}

function selectShipping(el, hasPaczkomat) {
  document.querySelectorAll(".shipping-method").forEach(m => m.classList.remove("selected"));
  el.classList.add("selected");
  selectedShippingId   = el.dataset.id;
  selectedShippingCost = getCartTotal() >= 119 ? 0 : parseFloat(el.dataset.cost);

  const ps = document.getElementById("paczkomat-section");
  if (hasPaczkomat) {
    ps.classList.remove("hidden");
    initMap();
  } else {
    ps.classList.add("hidden");
    selectedPaczkomat = null;
  }
  renderSummary();
}

function goToPayment() {
  if (!selectedShippingId) { alert("Wybierz metodę dostawy."); return; }
  if (selectedShippingId === "inpost-paczkomat" && !selectedPaczkomat) {
    alert("Wybierz paczkomat z mapy."); return;
  }
  document.getElementById("section-shipping").classList.add("hidden");
  document.getElementById("section-payment").classList.remove("hidden");
  setStep(3);
  renderSummary();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function selectPayment(el) {
  document.querySelectorAll(".shipping-method").forEach(m => m.classList.remove("selected"));
  el.classList.add("selected");
}

function placeOrder() {
  alert("✅ Zamówienie złożone! Zaraz zintegrujemy płatność Stripe.");
}

// ===== MAPA (InPost GeoWidget) =====
let mapInited = false;

function initMap() {
  if (mapInited) return;
  mapInited = true;

  const wrapper = document.getElementById("paczkomat-map-wrapper");
  wrapper.innerHTML = `
    <p style="font-size:0.82rem;color:var(--text-muted);margin:0.8rem 0 0.5rem;">
      Kliknij paczkomat na mapie aby go wybrać:
    </p>
    <div id="easypack-map" style="width:100%;height:380px;border-radius:14px;border:2px solid var(--border);overflow:hidden;"></div>
  `;

  // CSS widgetu
  const css = document.createElement("link");
  css.rel = "stylesheet";
  css.href = "https://geowidget.easypack24.net/stylesheets/inpost-geowidget.css";
  document.head.appendChild(css);

  // JS widgetu
  const js = document.createElement("script");
  js.src = "https://geowidget.easypack24.net/js/sdk-for-js.js";
  js.onload = () => {
    easyPack.init({
      defaultLocale: "pl",
      mapType: "osm",
      searchType: "osm",
      points: { types: ["parcel_locker"] },
      display: { showTypesFilters: false },
    });
    easyPack.mapWidget("easypack-map", (point) => {
      const street = point.address?.line1 || "";
      const city   = point.address?.line2 || "";
      selectPaczkomat(point.name, street, city);
    });
  };
  document.head.appendChild(js);
}

function searchPaczkomat() { /* widget ma wbudowane wyszukiwanie */ }

// ===== PODSUMOWANIE =====
function renderSummary() {
  const cart    = getCart();
  const total   = getCartTotal();
  const country = document.getElementById("country")?.value || "";
  const free    = country === "PL" && total >= 119;
  const ship    = free ? 0 : (country === "PL" ? selectedShippingCost : getIntlCost(country));

  document.getElementById("order-items-list").innerHTML = cart.map(item => {
    const p = getProductById(item.id);
    if (!p) return "";
    return `<div class="order-item">
      <div class="order-item-img"><img src="${p.image}" onerror="this.src='img/placeholder.jpg'"/></div>
      <div style="flex:1">
        <div class="order-item-name">${p.name} ${p.variant}</div>
        <div class="order-item-var">x${item.quantity}</div>
      </div>
      <div class="order-item-price">${formatPrice(p.price * item.quantity)}</div>
    </div>`;
  }).join("") || `<p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1rem;">Koszyk pusty</p>`;

  document.getElementById("sum-products").textContent = formatPrice(total);
  document.getElementById("sum-shipping").innerHTML   = ship === 0 && country
    ? '<span style="color:#3a8a4a;font-weight:700;">Darmowa 🎉</span>'
    : (ship ? formatPrice(ship) : "—");
  document.getElementById("sum-total").textContent = total ? formatPrice(total + ship) : "—";
}

document.head.appendChild(shakeCSS);

// Init
renderSummary();
updateCartIcon();
